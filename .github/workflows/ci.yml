name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same branch so the latest commit's results
# are the ones we look at.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-build:
    name: Typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  e2e:
    # Both chromium and mobile-webkit are GATING checks. The WebKit-specific
    # timing issues that previously forced `continue-on-error: true` on the
    # mobile-webkit job were closed by ticket 0005 (compose() route-awaits +
    # the waitForDb helper). Mobile Safari is where most users actually open
    # the app — its tests block merge too.
    name: E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: typecheck-build
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, mobile-webkit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Cache Playwright browser binaries between runs.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.project == 'mobile-webkit' && 'webkit' || matrix.project }}

      - name: Install system deps (cached browsers)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.project == 'mobile-webkit' && 'webkit' || matrix.project }}

      - name: Run tests
        run: npx playwright test --project=${{ matrix.project }} --reporter=github,html

      - name: Upload Playwright trace + report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            playwright-report
            test-results
          retention-days: 14
