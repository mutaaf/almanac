<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Almanac</title>
    <meta name="description" content="A local-first personal almanac. One page a day, written for you." />

    <!-- Editorial pairing: Cormorant Garamond (display, serif) + Inter Tight (body, sans).
         Cormorant is freely available, has real italics, and feels closer to a real
         book face than the usual Google fonts. Inter Tight keeps controls quiet. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app" aria-live="polite"></main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
